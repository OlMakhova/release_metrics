<script type="text/babel">
// ─── Storage Helper with localStorage fallback ────────────────────────────────
class StorageManager {
  constructor() {
    this.isLocalStorageAvailable = this.checkLocalStorage();
    this.inMemoryData = this.loadInitialData();
  }

  checkLocalStorage() {
    try {
      const test = '__storage_test__';
      localStorage.setItem(test, test);
      localStorage.removeItem(test);
      return true;
    } catch(e) {
      console.warn('localStorage недоступен, используется память браузера', e);
      return false;
    }
  }

  loadInitialData() {
    try {
      if (this.isLocalStorageAvailable) {
        const saved = localStorage.getItem('hrm_app_data');
        if (saved) return JSON.parse(saved);
      }
    } catch(e) {
      console.error('Ошибка загрузки данных:', e);
    }
    return null;
  }

  save(key, data) {
    try {
      const dataStr = JSON.stringify(data);
      if (this.isLocalStorageAvailable) {
        localStorage.setItem(key, dataStr);
      }
      this.inMemoryData = data;
      return true;
    } catch(e) {
      console.error('Ошибка сохранения:', e);
      this.inMemoryData = data;
      return false;
    }
  }

  load(key) {
    if (this.inMemoryData) return this.inMemoryData;
    try {
      if (this.isLocalStorageAvailable) {
        const saved = localStorage.getItem(key);
        if (saved) {
          this.inMemoryData = JSON.parse(saved);
          return this.inMemoryData;
        }
      }
    } catch(e) {
      console.error('Ошибка загрузки:', e);
    }
    return null;
  }
}

const storage = new StorageManager();

// ─── React ────────────────────────────────────────────────────────────────────
const { useState, useMemo, useRef, useEffect } = React;

// ─── constants ────────────────────────────────────────────────────────────────
const RELEASED_STATUSES = ["релиз", "принята"];
function isReleased(s){ return RELEASED_STATUSES.includes((s||"").trim().toLowerCase()); }

function parseDMY(str){
  if(!str) return null;
  const p = str.trim().split(".");
  if(p.length!==3) return null;
  const d = new Date(+p[2], +p[1]-1, +p[0]);
  return isNaN(d.getTime()) ? null : d;
}

function parseRedmineCSV(text){
  const clean = text.replace(/^\uFEFF/,"").replace(/^\s+/, "");
  const lines = clean.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return { error:"Файл пустой или содержит только заголовок" };
  const delim = lines[0].includes(";") ? ";" : ",";
  function splitLine(line){
    const res=[]; let cur="", inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===delim&&!inQ){res.push(cur.trim().replace(/^"|"$/g,"")); cur="";}
      else{cur+=ch;}
    }
    res.push(cur.trim().replace(/^"|"$/g,""));
    return res;
  }
  const headers = splitLine(lines[0]);
  function findCol(...names){
    for(const n of names){
      const idx=headers.findIndex(h=>h.trim().toLowerCase()===n.toLowerCase());
      if(idx!==-1) return idx;
    }
    return -1;
  }
  const iStatus  = findCol("статус","status");
  const iCat     = findCol("категория","category");
  const iStart   = findCol("дата начала","дата создания","created","start date");
  const iRelease = findCol("дата релиза","дата закрытия","closed","release date");
  if(iStatus===-1) return { error:`Не найден столбец «Статус». Найденные столбцы: ${headers.join(", ")}` };
  const tasks=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitLine(lines[i]);
    if(cols.length<2) continue;
    tasks.push({
      status:      cols[iStatus]||"",
      category:    iCat>=0?(cols[iCat]||"").trim():"",
      dateStart:   iStart>=0?cols[iStart]:"",
      dateRelease: iRelease>=0?cols[iRelease]:"",
    });
  }
  if(!tasks.length) return { error:"Задачи не найдены" };
  const releasedTasks = tasks.filter(t=>isReleased(t.status));
  const leadTimes = releasedTasks.map(t=>{
    const d1=parseDMY(t.dateStart), d2=parseDMY(t.dateRelease);
    if(!d1||!d2) return null;
    return Math.round((d2-d1)/86400000);
  }).filter(v=>v!==null&&v>=0);
  const avgLeadTime = leadTimes.length ? Math.round(leadTimes.reduce((s,v)=>s+v,0)/leadTimes.length) : null;
  const catMap={};
  tasks.forEach(t=>{ const c=t.category||"Без категории"; if(!catMap[c]) catMap[c]={total:0,released:0}; catMap[c].total++; });
  releasedTasks.forEach(t=>{ const c=t.category||"Без категории"; if(catMap[c]) catMap[c].released++; });
  return { tasks, planned:tasks.length, released:releasedTasks.length, velocity:releasedTasks.length,
    leadTime:avgLeadTime, catMap, hasLeadTime:leadTimes.length>0, hasCat:iCat>=0 };
}

// ─── targets & metric defs ────────────────────────────────────────────────────
const TARGETS = {
  conversion:     {min:70, max:90},
  leadTime:       {max:14},
  velocity:       {min:5,  max:15},
  monthToRelease: {min:50, max:70},
  monthConv:      {min:70, max:90},
  monthLeadTime:  {max:14},
};

const RELEASE_METRICS = [
  {key:"conversion",    label:"Конверсия план→релиз", suffix:"%", hint:"70–90%"},
  {key:"leadTime",      label:"Lead Time",             suffix:"д", hint:"< 14д"},
  {key:"velocity",      label:"Velocity",              suffix:"",  hint:"5–15"},
  {key:"monthToRelease",label:"Месяц→Релиз",           suffix:"%", hint:"50–70%"},
];

const MONTH_METRICS = [
  {key:"monthConv",     label:"Конверсия месяц→релиз", suffix:"%", hint:"70–90%"},
  {key:"monthLeadTime", label:"Lead Time (месяц)",      suffix:"д", hint:"< 14д"},
  {key:"monthVelocity", label:"Выпущено за месяц",      suffix:"",  hint:""},
  {key:"monthCoverage", label:"Охват бэклога",          suffix:"%", hint:"50–70%"},
];

// ─── sample data ──────────────────────────────────────────────────────────────
const INITIAL_RELEASES = [
  {id:1,release:"v08.02.2026",date:"2026-02-21",planned:11,released:8, leadTime:11,velocity:8, monthPlanned:38,catMap:{},monthId:null},
  {id:2,release:"v14.02.2026",date:"2026-02-28",planned:13,released:10,leadTime:13,velocity:10,monthPlanned:38,catMap:{},monthId:null},
  {id:3,release:"v07.03.2026",date:"2026-03-07",planned:12,released:9, leadTime:9, velocity:9, monthPlanned:40,catMap:{},monthId:1},
  {id:4,release:"v14.03.2026",date:"2026-03-14",planned:10,released:11,leadTime:16,velocity:11,monthPlanned:40,catMap:{},monthId:1},
  {id:5,release:"v19.03.2026",date:"2026-03-19",planned:14,released:7, leadTime:12,velocity:7, monthPlanned:40,catMap:{},monthId:1},
];

const INITIAL_MONTHS = [
  {id:1, label:"Март 2026", planned:68, catMap:{}},
];

const pct=(a,b)=>b>0?Math.round((a/b)*100):0;

function computeRelease(r){
  return {...r, conversion:pct(r.released,r.planned), monthToRelease:pct(r.released,r.monthPlanned)};
}

function computeMonth(m, releases){
  const linked = releases.filter(r=>r.monthId===m.id);
  const totalReleased = linked.reduce((s,r)=>s+(r.released||0),0);
  const allLeadTimes  = linked.map(r=>r.leadTime).filter(v=>v!==null&&v!==undefined);
  const avgLT = allLeadTimes.length ? Math.round(allLeadTimes.reduce((s,v)=>s+v,0)/allLeadTimes.length) : null;

  const catMap={};
  linked.forEach(r=>{
    if(!r.catMap) return;
    Object.entries(r.catMap).forEach(([cat,v])=>{
      if(!catMap[cat]) catMap[cat]={total:0,released:0};
      catMap[cat].total    += v.total    ||0;
      catMap[cat].released += v.released ||0;
    });
  });
  const totalFromCat = Object.values(catMap).reduce((s,v)=>s+(v.total||0),0);
  const releasedFromCat = Object.values(catMap).reduce((s,v)=>s+(v.released||0),0);
  const monthConv = pct(totalReleased, m.planned);
  return {
    ...m, monthVelocity:totalReleased, monthLeadTime:avgLT, monthConv,
    monthCoverage: totalFromCat>0 ? pct(releasedFromCat, totalFromCat) : null, catMap
  };
}

// ─── App Component ────────────────────────────────────────────────────────────
function App(){
  const [releases, setReleases] = useState(()=>{
    const saved = storage.load('hrm_app_data');
    return saved?.releases || INITIAL_RELEASES;
  });
  const [months, setMonths] = useState(()=>{
    const saved = storage.load('hrm_app_data');
    return saved?.months || INITIAL_MONTHS;
  });
  const [tab, setTab] = useState("releases");
  const [showRF, setShowRF] = useState(false);
  const [showMF, setShowMF] = useState(false);
  const [showExport, setShowExport] = useState(false);

  useEffect(() => {
    storage.save('hrm_app_data', { releases, months });
  }, [releases, months]);

  const releasesMemo = useMemo(() => releases.map(computeRelease), [releases]);
  const monthsMemo = useMemo(() => months.map(m => computeMonth(m, releases)), [months, releases]);
  const globalCatMap = useMemo(() => {
    const m={};
    releases.forEach(r=>{
      if(!r.catMap) return;
      Object.entries(r.catMap).forEach(([cat,v])=>{
        if(!m[cat]) m[cat]={total:0,released:0};
        m[cat].total    += v.total    ||0;
        m[cat].released += v.released ||0;
      });
    });
    return m;
  }, [releases]);

  const [rfForm, setRfForm] = useState({release:"",date:"",planned:0,released:0,leadTime:null,monthId:null});
  const [rfMode, setRfMode] = useState("manual");
  const [rfCsv, setRfCsv] = useState("");
  const [rfErr, setRfErr] = useState("");
  const [rfParsed, setRfParsed] = useState(null);

  const [mfForm, setMfForm] = useState({label:"",planned:0});
  const [mfMode, setMfMode] = useState("manual");
  const [mfCsv, setMfCsv] = useState("");
  const [mfErr, setMfErr] = useState("");
  const [mfParsed, setMfParsed] = useState(null);

  const handleRfCsvChange = (e) => {
    const text = e.target.value;
    setRfCsv(text);
    if(!text.trim()){ setRfErr(""); setRfParsed(null); return; }
    const result = parseRedmineCSV(text);
    if(result.error){ setRfErr(result.error); setRfParsed(null); }
    else { setRfErr(""); setRfParsed(result); }
  };

  const handleMfCsvChange = (e) => {
    const text = e.target.value;
    setMfCsv(text);
    if(!text.trim()){ setMfErr(""); setMfParsed(null); return; }
    const result = parseRedmineCSV(text);
    if(result.error){ setMfErr(result.error); setMfParsed(null); }
    else { setMfErr(""); setMfParsed(result); }
  };

  const addRelease = () => {
    const data = rfMode==="manual" ? rfForm : { release:rfForm.release, date:rfForm.date, ...rfParsed };
    const newId = Math.max(0,...releases.map(r=>r.id))+1;
    setReleases([...releases, {...data, id:newId}]);
    setShowRF(false);
    setRfForm({release:"",date:"",planned:0,released:0,leadTime:null,monthId:null});
    setRfMode("manual");
    setRfCsv("");
    setRfErr("");
    setRfParsed(null);
  };

  const addMonth = () => {
    const data = mfMode==="manual" ? mfForm : { ...mfForm, ...mfParsed };
    const newId = Math.max(0,...months.map(m=>m.id))+1;
    setMonths([...months, {...data, id:newId, catMap:data.catMap||{}}]);
    setShowMF(false);
    setMfForm({label:"",planned:0});
    setMfMode("manual");
    setMfCsv("");
    setMfErr("");
    setMfParsed(null);
  };

  const updateRelease = (id, updates) => {
    setReleases(releases.map(r => r.id===id ? {...r,...updates} : r));
  };

  const deleteRelease = (id) => {
    setReleases(releases.filter(r=>r.id!==id));
  };

  const deleteMonth = (id) => {
    setMonths(months.filter(m=>m.id!==id));
  };

  const StatCard = ({label, value, suffix, target, status}) => {
    let bgColor = "#f8fafc", borderColor = "#e2e8f0", textColor = "#0f172a";
    if(status==="ok") { bgColor="#ecfdf5"; borderColor="#bbf7d0"; textColor="#065f46"; }
    else if(status==="warn") { bgColor="#fffbeb"; borderColor="#fde047"; textColor="#b45309"; }
    else if(status==="bad") { bgColor="#fef2f2"; borderColor="#fecaca"; textColor="#991b1b"; }
    return <div style={{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:12,padding:"16px 14px",flex:1,minWidth:140}}>
      <div style={{fontSize:12,color:"#64748b",marginBottom:4,fontWeight:500}}>{label}</div>
      <div style={{fontSize:28,fontWeight:700,color:textColor,marginBottom:4}}>
        {value}{suffix&&<span style={{fontSize:16,marginLeft:2}}>{suffix}</span>}
      </div>
      {target&&<div style={{fontSize:11,color:"#6b7280"}}>{target}</div>}
    </div>;
  };

  const MetricRow = ({metric, value, releaseData}) => {
    const t = TARGETS[metric.key];
    let status = "neutral";
    if(t){
      if(t.min!==undefined && value<t.min) status="bad";
      else if(t.max!==undefined && value>t.max) status="bad";
      else if(value>=t.min && value<=t.max) status="ok";
    }
    const hint = metric.hint ? `(цель ${metric.hint})` : "";
    return <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f1f5f9",alignItems:"center"}}>
      <span style={{fontSize:13,color:"#475569"}}>{metric.label} {hint}</span>
      <span style={{fontSize:14,fontWeight:600,color:status==="ok"?"#16a34a":status==="bad"?"#dc2626":"#1e293b"}}>
        {value}{metric.suffix}
      </span>
    </div>;
  };

  const ModulesPanel = ({catMap}) => {
    const total = Object.values(catMap).reduce((s,v)=>s+(v.total||0),0);
    const items = Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);
    return <div>
      {items.map(([cat,{total:t,released:rel}])=>{
        const pct_all = total>0 ? Math.round((t/total)*100) : 0;
        const pct_rel = t>0 ? Math.round((rel/t)*100) : 0;
        return <div key={cat} style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid #e2e8f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>

            <span style={{fontSize:12,color:"#64748b"}}>{rel}/{t} ({pct_rel}%)</span>
          </div>
          <div style={{width:"100%",height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct_rel}%`,background:"#3b82f6",transition:"width .3s"}}/>
          </div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>От всех: {pct_all}%</div>
        </div>;
      })}
    </div>;
  };

  const ParsedInfo = ({parsed}) => (
    <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:12,marginBottom:12,fontSize:13,color:"#166534"}}>
      ✓ {parsed.planned} задач · {parsed.released} выпущено · Среднее LT: {parsed.leadTime}д
    </div>
  );

  return <div style={{padding:"20px 30px 40px"}}>
    <div style={{maxWidth:1400,margin:"0 auto"}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:28,fontWeight:700,color:"#0f172a",marginBottom:8}}>📊 HRM Release Metrics</div>
        <div style={{fontSize:14,color:"#64748b"}}>Аналитика релизов и метрики доставки</div>
      </div>

      {!storage.isLocalStorageAvailable && (
        <div className="storage-warning">
          <span>⚠</span>
          <div>
            <strong>Заметка:</strong> localStorage недоступен. Ваши данные сохраняются в памяти браузера и будут потеряны при перезагрузке. 
            Для постоянного сохранения экспортируйте данные через кнопку «Экспорт».
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:8,marginBottom:24,borderBottom:"1px solid #e2e8f0",paddingBottom:16,overflowX:"auto"}}>
        {[
          {key:"releases",label:"Релизы"},
          {key:"months",label:"Месяцы"},
          {key:"modules",label:"Модули"},
          {key:"guide",label:"Инструкция"},
        ].map(({key,label})=>
          <button key={key} onClick={()=>setTab(key)} style={{
            padding:"8px 16px",borderRadius:8,border:key===tab?"2px solid #3b82f6":"none",
            background:key===tab?"#eff6ff":"transparent",color:key===tab?"#1e40af":"#64748b",
            cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",transition:"all .2s"
          }}>{label}</button>)}
      </div>

      {tab==="releases"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"#0f172a",marginBottom:4}}>Релизы</div>
            <div style={{fontSize:13,color:"#64748b"}}>Всего: {releases.length}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShowRF(!showRF);setShowExport(false);}} style={{
              padding:"9px 18px",borderRadius:8,border:"none",background:"#3b82f6",color:"#fff",
              cursor:"pointer",fontSize:13,fontWeight:600}}>+ Добавить релиз</button>
            <button onClick={()=>setShowExport(!showExport)} style={{
              padding:"9px 18px",borderRadius:8,border:"1px solid #cbd5e1",background:"#fff",
              color:"#475569",cursor:"pointer",fontSize:13}}>⬇ Экспорт</button>
          </div>
        </div>

        {showExport&&<div style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,color:"#0f172a",marginBottom:12}}>Экспортировать данные</div>
          <button onClick={()=>{
            const data = JSON.stringify({releases,months},null,2);
            const blob = new Blob([data], {type:"application/json"});

            const a = document.createElement("a");
            a.href = url;
            a.download = "hrm_data.json";
            a.click();

          }} style={{padding:"8px 16px",borderRadius:8,background:"#10b981",color:"#fff",
            border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>Скачать JSON</button>
        </div>}

        {showRF&&<div style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,color:"#0f172a",marginBottom:16}}>Добавить релиз</div>
          <div style={{display:"flex",gap:12,marginBottom:16}}>
            {["manual","csv"].map(mode=>
              <button key={mode} onClick={()=>{setRfMode(mode);setRfCsv("");setRfErr("");setRfParsed(null);}} style={{
                padding:"8px 14px",borderRadius:8,border:rfMode===mode?"2px solid #3b82f6":"1px solid #cbd5e1",
                background:rfMode===mode?"#eff6ff":"#fff",color:rfMode===mode?"#1e40af":"#64748b",
                cursor:"pointer",fontSize:13,fontWeight:600}}>{mode==="manual"?"Ввести вручную":"Загрузить CSV"}</button>)}
          </div>
          {rfMode==="manual"?<>
            <input className="inp" type="text" placeholder="Версия (v20.03.2026)" value={rfForm.release}
              onChange={e=>setRfForm({...rfForm,release:e.target.value})} style={{marginBottom:12}}/>
            <input className="inp" type="date" value={rfForm.date}
              onChange={e=>setRfForm({...rfForm,date:e.target.value})} style={{marginBottom:12}}/>
            <input className="inp" type="number" placeholder="Запланировано" value={rfForm.planned||0}
              onChange={e=>setRfForm({...rfForm,planned:+e.target.value})} style={{marginBottom:12}}/>
            <input className="inp" type="number" placeholder="Выпущено" value={rfForm.released||0}
              onChange={e=>setRfForm({...rfForm,released:+e.target.value})} style={{marginBottom:12}}/>
            <input className="inp" type="number" placeholder="Lead Time (дни)" value={rfForm.leadTime||""}
              onChange={e=>setRfForm({...rfForm,leadTime:e.target.value?+e.target.value:null})} style={{marginBottom:12}}/>
            <select className="inp" value={rfForm.monthId||"none"}
              onChange={e=>setRfForm({...rfForm,monthId:e.target.value==="none"?null:+e.target.value})} style={{marginBottom:12}}>
              <option value="none">Без месяца</option>
              {months.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
          </>:<>
            <textarea className="inp" placeholder="Вставьте CSV из Redmine..." value={rfCsv}
              onChange={handleRfCsvChange} style={{minHeight:200,marginBottom:12,fontFamily:"monospace",fontSize:12}}/>
            {rfErr&&<div style={{padding:"10px 14px",background:"#fee2e2",border:"1px solid #fca5a5",
              borderRadius:8,fontSize:13,color:"#991b1b",marginBottom:12}}>⚠ {rfErr}</div>}
            {rfParsed&&<>
              <ParsedInfo parsed={rfParsed}/>
              <input className="inp" type="text" placeholder="Версия релиза" value={rfForm.release}
                onChange={e=>setRfForm({...rfForm,release:e.target.value})} style={{marginBottom:12}}/>
              <input className="inp" type="date" value={rfForm.date}
                onChange={e=>setRfForm({...rfForm,date:e.target.value})} style={{marginBottom:12}}/>
              <select className="inp" value={rfForm.monthId||"none"}
                onChange={e=>setRfForm({...rfForm,monthId:e.target.value==="none"?null:+e.target.value})} style={{marginBottom:12}}>
                <option value="none">Без месяца</option>
                {months.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
            </>}
          </>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={addRelease} disabled={!rfForm.release||(rfMode==="manual"&&!rfForm.date)} style={{
              padding:"9px 24px",borderRadius:8,border:"none",
              background:(rfForm.release&&(rfMode==="csv"||rfForm.date))?"#3b82f6":"#cbd5e1",
              color:"#fff",cursor:(rfForm.release&&(rfMode==="csv"||rfForm.date))?"pointer":"default",fontSize:13,fontWeight:600}}>
              Сохранить релиз
            </button>
            <button onClick={()=>{setShowRF(false);setRfForm({release:"",date:"",planned:0,released:0,leadTime:null,monthId:null});setRfMode("manual");setRfCsv("");setRfErr("");setRfParsed(null);}} style={{
              padding:"9px 18px",borderRadius:8,border:"1px solid #cbd5e1",background:"#fff",color:"#475569",cursor:"pointer",fontSize:13}}>Отмена</button>
          </div>
        </div>}

        {releasesMemo.map(r=><div key={r.id} style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{r.release}</div>
              <div style={{fontSize:12,color:"#64748b"}}>{r.date}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const newLT = prompt("Lead Time (дни):", r.leadTime||"");
                if(newLT!==null) updateRelease(r.id,{leadTime:newLT?+newLT:null});
              }} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#e0e7ff",color:"#3730a3",cursor:"pointer",fontSize:12}}>✎</button>
              <button onClick={()=>deleteRelease(r.id)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#fee2e2",color:"#991b1b",cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:16}}>
            <StatCard label="Запланировано" value={r.planned} suffix="" target=""/>
            <StatCard label="Выпущено" value={r.released} suffix="" target=""/>
            <StatCard label="Конверсия" value={r.conversion} suffix="%" target="(цель 70-90%)" status={r.conversion>=70&&r.conversion<=90?"ok":r.conversion<70?"bad":"warn"}/>
            <StatCard label="Lead Time" value={r.leadTime} suffix="д" target="(цель <14)" status={r.leadTime&&r.leadTime<=14?"ok":"bad"}/>
          </div>
          {RELEASE_METRICS.map(m=><MetricRow key={m.key} metric={m} value={r[m.key]} releaseData={r}/>)}
        </div>)}
      </div>}

      {tab==="months"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"#0f172a",marginBottom:4}}>Месяцы</div>
            <div style={{fontSize:13,color:"#64748b"}}>Всего: {months.length}</div>
          </div>
          <button onClick={()=>{setShowMF(!showMF);setShowRF(false);}} style={{
            padding:"9px 18px",borderRadius:8,border:"none",background:"#3b82f6",color:"#fff",
            cursor:"pointer",fontSize:13,fontWeight:600}}>+ Добавить месяц</button>
        </div>

        {showMF&&<div style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,color:"#0f172a",marginBottom:16}}>Добавить месяц</div>
          <div style={{display:"flex",gap:12,marginBottom:16}}>
            {["manual","csv"].map(mode=>
              <button key={mode} onClick={()=>{setMfMode(mode);setMfCsv("");setMfErr("");setMfParsed(null);}} style={{
                padding:"8px 14px",borderRadius:8,border:mfMode===mode?"2px solid #3b82f6":"1px solid #cbd5e1",
                background:mfMode===mode?"#eff6ff":"#fff",color:mfMode===mode?"#1e40af":"#64748b",
                cursor:"pointer",fontSize:13,fontWeight:600}}>{mode==="manual"?"Ввести вручную":"Загрузить CSV"}</button>)}
          </div>
          {mfMode==="manual"?<>
            <input className="inp" type="text" placeholder="Название (Март 2026)" value={mfForm.label}
              onChange={e=>setMfForm({...mfForm,label:e.target.value})} style={{marginBottom:12}}/>
            <input className="inp" type="number" placeholder="Задач в бэклоге" value={mfForm.planned||0}
              onChange={e=>setMfForm({...mfForm,planned:+e.target.value})} style={{marginBottom:12}}/>
          </>:<>
            <textarea className="inp" placeholder="CSV бэклога месяца (Статус, Категория)" value={mfCsv}
              onChange={handleMfCsvChange} style={{minHeight:200,marginBottom:12,fontFamily:"monospace",fontSize:12}}/>
            {mfErr&&<div style={{padding:"10px 14px",background:"#fee2e2",border:"1px solid #fca5a5",
              borderRadius:8,fontSize:13,color:"#991b1b",marginBottom:12}}>⚠ {mfErr}</div>}
            {mfParsed&&<ParsedInfo parsed={mfParsed}
              leadTimeVal="" onLeadTimeChange={()=>{}}/>}
          </>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={addMonth} disabled={!mfForm.label} style={{
              padding:"9px 24px",borderRadius:8,border:"none",
              background:mfForm.label?"#3b82f6":"#cbd5e1",
              color:"#fff",cursor:mfForm.label?"pointer":"default",fontSize:13,fontWeight:600}}>
              Сохранить месяц
            </button>
            <button onClick={()=>{setShowMF(false);setMfParsed(null);setMfErr("");}} style={{
              padding:"9px 18px",borderRadius:8,border:"1px solid #cbd5e1",
              background:"#fff",color:"#475569",cursor:"pointer",fontSize:13}}>Отмена</button>
          </div>
        </div>}

        {monthsMemo.map(m=><div key={m.id} style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{m.label}</div>
              <div style={{fontSize:12,color:"#64748b"}}>Запланировано: {m.planned}</div>
            </div>
            <button onClick={()=>deleteMonth(m.id)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#fee2e2",color:"#991b1b",cursor:"pointer",fontSize:12}}>✕</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:16}}>
            <StatCard label="Выпущено" value={m.monthVelocity} suffix="" target=""/>
            <StatCard label="Конверсия" value={m.monthConv} suffix="%" target="(цель 70-90%)" status={m.monthConv>=70&&m.monthConv<=90?"ok":"bad"}/>
            {m.monthLeadTime&&<StatCard label="Lead Time" value={m.monthLeadTime} suffix="д" target="(цель <14)" status={m.monthLeadTime<=14?"ok":"bad"}/>}
            {m.monthCoverage!==null&&<StatCard label="Охват" value={m.monthCoverage} suffix="%" target="(цель 50-70%)" status={m.monthCoverage>=50&&m.monthCoverage<=70?"ok":"bad"}/>}
          </div>
          {Object.keys(m.catMap).length>0&&<>
            <div style={{fontSize:13,fontWeight:600,color:"#1e293b",marginBottom:12}}>По модулям:</div>
            <ModulesPanel catMap={m.catMap}/>
          </>}
        </div>)}
      </div>}

      {tab==="modules"&&<div>
        {Object.keys(globalCatMap).length===0
          ?<div style={{background:"#fff",borderRadius:14,padding:32,textAlign:"center",
            border:"1px solid #e2e8f0",color:"#94a3b8"}}>
            <div style={{fontSize:32,marginBottom:12}}>📂</div>
            <div style={{fontSize:14,fontWeight:600,color:"#64748b",marginBottom:4}}>Нет данных по модулям</div>
            <div style={{fontSize:13}}>Загрузите CSV при добавлении релиза — нужен столбец «Категория»</div>
          </div>
          :<>
            <div style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <div style={{fontSize:15,fontWeight:700,color:"#0f172a",marginBottom:4}}>Сводка по всем релизам</div>
              <div style={{fontSize:13,color:"#64748b",marginBottom:16}}>
                % от всех — доля задач модуля от общего числа задач по всем релизам
              </div>
              <ModulesPanel catMap={globalCatMap}/>
            </div>

            {releasesMemo.filter(r=>r.catMap&&Object.keys(r.catMap).length>0).length>0&&
              <div style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #e2e8f0"}}>
                <div style={{fontSize:15,fontWeight:700,color:"#0f172a",marginBottom:16}}>По каждому релизу</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:16}}>
                  {releasesMemo.filter(r=>r.catMap&&Object.keys(r.catMap).length>0).map(r=>
                    <div key={r.id} style={{border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden"}}>
                      <div style={{padding:"10px 14px",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",
                        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,
                          color:"#1e40af",fontSize:13}}>{r.release}</span>
                        <span style={{fontSize:12,color:"#64748b"}}>{r.date}</span>
                      </div>
                      <div style={{padding:"12px 14px"}}>
                        <ModulesPanel catMap={r.catMap}/>
                      </div>
                    </div>)}
                </div>
              </div>}
          </>}
      </div>}

      {tab==="guide"&&<div style={{background:"#fff",borderRadius:14,padding:28,
        border:"1px solid #e2e8f0",maxWidth:820}}>
        <div style={{fontSize:16,fontWeight:700,color:"#0f172a",marginBottom:24}}>Инструкция</div>

        <div style={{marginBottom:28}}>
          <div style={{fontSize:14,fontWeight:600,color:"#1e40af",marginBottom:14}}>📊 Что означает каждая метрика</div>
          {[
            {
              name:"Конверсия план→релиз",hint:"цель 70–90%",
              desc:"Доля задач из недельного плана, которые реально вошли в релиз.",
              formula:"Выпущено / Запланировано × 100%",
              why:"Показывает точность планирования спринта. Ниже 70% — план завышен или задачи не готовы к разработке. Выше 90% — хороший знак, но следите за качеством."
            },
            {
              name:"Lead Time",hint:"цель < 14 дней",
              desc:"Среднее время от создания задачи до её попадания в релиз.",
              formula:"Дата релиза − Дата начала (среднее по задачам в релизе)",
              why:"Показывает скорость доставки. Чем меньше — тем быстрее команда реагирует на запросы клиентов. Высокий Lead Time часто говорит о застрявших задачах в бэклоге."
            },
            {
              name:"Velocity",hint:"цель 5–15 задач",
              desc:"Количество задач, выпущенных в одном релизе.",
              formula:"Количество задач со статусом «Релиз» или «Принята»",
              why:"Показывает пропускную способность команды. Стабильная Velocity — признак предсказуемого процесса. Резкие скачки вниз — сигнал: отпуска, сложные задачи, технические проблемы."
            },
            {
              name:"Месяц→Релиз",hint:"цель 50–70%",
              desc:"Доля задач из месячного плана, которая вошла в конкретный недельный релиз.",
              formula:"Выпущено в релизе / Задач запланировано на месяц × 100%",
              why:"Один месяц = несколько релизов, поэтому 20–30% на релиз — норма. Если сложить все релизы месяца — суммарно должно получиться 50–70% от месячного плана (остаток переносится или отменяется)."
            },
          ].map(({name,hint,desc,formula,why})=>
            <div key={name} style={{marginBottom:16,padding:"14px 16px",background:"#f8fafc",
              borderRadius:10,borderLeft:"3px solid #3b82f6"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6,gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{name}</span>
                <span style={{fontSize:11,color:"#6366f1",fontFamily:"'IBM Plex Mono',monospace",
                  background:"#eff6ff",padding:"2px 8px",borderRadius:10}}>{hint}</span>
              </div>
              <div style={{fontSize:13,color:"#374151",marginBottom:6}}>{desc}</div>
              <div style={{fontSize:12,color:"#6366f1",fontFamily:"'IBM Plex Mono',monospace",
                background:"#fff",padding:"4px 10px",borderRadius:6,marginBottom:6,
                border:"1px solid #e0e7ff"}}>{formula}</div>
              <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>{why}</div>
            </div>)}
        </div>

        {[
          {icon:"📂",title:"Как подготовить CSV из Redmine",items:[
            "Откройте список задач, примените фильтр по версии релиза",
            "Убедитесь, что в таблице есть: Статус, Категория, Дата начала, Дата релиза",
            "Нажмите «Экспорт» → CSV (разделитель ; UTF-8)",
            "Статус «Релиз» или «Принята» — задача вошла в релиз",
            "Все прочие статусы (Готово к релизу, На ревью и др.) — задача не вошла",
          ]},
          {icon:"📅",title:"Как работать с месяцами",items:[
            "Создайте месяц в разделе «Месяцы» — укажите название и количество задач в бэклоге",
            "Можно загрузить CSV бэклога месяца — тогда будет аналитика по модулям на уровне месяца",
            "При добавлении релиза выберите «Привязать к месяцу» — релиз войдёт в сводку месяца",
            "В разделе «Месяцы» → «Подробнее» видите все релизы месяца и разбивку по модулям",
          ]},
          {icon:"➕",title:"Как добавить релиз",items:[
            "Нажмите «+ Добавить релиз» в разделе «Релизы»",
            "Версия релиза в формате v20.03.2026",
            "Выберите: «Ввести вручную» или «Загрузить CSV» — при загрузке всё считается автоматически",
            "Привяжите релиз к месяцу — для расчёта месячной аналитики",
          ]},
        ].map(({icon,title,items})=>
          <div key={title} style={{marginBottom:24}}>
            <div style={{fontSize:14,fontWeight:600,color:"#1e40af",marginBottom:10}}>{icon} {title}</div>
            <div style={{paddingLeft:16}}>
              {items.map((item,i)=><div key={i} style={{fontSize:13,color:"#475569",padding:"5px 0",
                borderBottom:"1px solid #f1f5f9",lineHeight:1.5}}>{item}</div>)}
            </div>
          </div>)}
      </div>}

      <div style={{marginTop:20,fontSize:12,color:"#94a3b8",display:"flex",gap:16,flexWrap:"wrap"}}>
        <span>Данные хранятся локально в браузере</span>
        <span>·</span>
        <span>Экспортируйте данные регулярно для безопасности</span>
        <span>·</span>
        <span>✎ — редактировать · ✕ — удалить</span>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
